app-id: io.github.TB516.BootcBuddy
runtime: org.gnome.Platform
runtime-version: "50"
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.node24
command: bootc-buddy

build-options:
  append-path: /usr/lib/sdk/node24/bin
  env:
    npm_config_nodedir: /usr/lib/sdk/node24

finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
  - --device=dri
  - --talk-name=org.freedesktop.Flatpak

modules:
  - name: bootc-buddy
    buildsystem: simple
    build-options:
      build-args:
        - --share=network
      env:
        COREPACK_HOME: /app/share/corepack
        PNPM_HOME: /run/build/bootc-buddy/.pnpm-home
    build-commands:
      - /usr/lib/sdk/node24/install.sh
      - mkdir -p /app/share/corepack
      - corepack install
      - corepack pnpm install --frozen-lockfile
      - corepack pnpm build
      - mkdir -p /app/share/bootc-buddy
      - cp -r dist /app/share/bootc-buddy/dist
      - install -Dm755 build-aux/flatpak/bootc-buddy /app/bin/bootc-buddy
    sources:
      - type: dir
        path: ../..
        skip:
          - .git
          - .flatpak-build
          - .flatpak-build-release
          - .flatpak-builder
          - .vscode
          - dist
          - node_modules
